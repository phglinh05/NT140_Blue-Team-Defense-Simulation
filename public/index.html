<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>FoodRun - Trang chủ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .product-img { height: 150px; object-fit: cover; }
        .sidebar { height: 100vh; overflow-y: auto; position: sticky; top: 0; background: #fff; border-left: 1px solid #ddd; }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-danger px-3">
        <a class="navbar-brand fw-bold" href="#">FoodRun</a>
        <span class="text-white" id="welcomeMsg">Xin chào!</span>
        <div>
            <button class="btn btn-outline-light btn-sm me-2" onclick="showHistory()">Lịch sử</button>
            <button class="btn btn-warning btn-sm" onclick="logout()">Đăng xuất</button>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <!-- Cột trái: Danh sách món -->
            <div class="col-md-9 p-4 bg-light">
                <h4 class="text-primary border-bottom pb-2">🍛 Đồ Ăn</h4>
                <div id="foodList" class="row g-3 mb-4"></div>

                <h4 class="text-warning border-bottom pb-2">🥤 Nước Uống</h4>
                <div id="drinkList" class="row g-3"></div>
            </div>

            <!-- Cột phải: Giỏ hàng -->
            <div class="col-md-3 sidebar p-3 shadow-sm">
                <h4 class="text-center mb-3">Giỏ Hàng</h4>
                <ul id="cartItems" class="list-group mb-3"></ul>
                <div class="d-flex justify-content-between fw-bold fs-5 mb-3">
                    <span>Tổng:</span>
                    <span id="totalPrice" class="text-danger">0 đ</span>
                </div>
                <button class="btn btn-success w-100 py-2" onclick="placeOrder()">XÁC NHẬN ĐẶT HÀNG</button>
            </div>
        </div>
    </div>

    <!-- Modal Lịch sử -->
    <div class="modal fade" id="historyModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Lịch sử đơn hàng</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="historyContent"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
    <script>
        // Kiểm tra đăng nhập khi vào trang
        if (!localStorage.getItem('currentUser')) window.location.href = 'login.html';
        else loadProducts();
    </script>
</body>
</html>
