<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodRun - Đặt món ngon, giao nhanh</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="styles.css" rel="stylesheet">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid px-4">
            <a class="navbar-brand" href="#">🍔 FoodRun</a>
            <div class="d-flex align-items-center gap-2">
                <span class="welcome-user" id="welcomeMsg">Xin chào!</span>
                <button class="btn btn-history" id="btnHistory">📋 Lịch sử</button>
                <button class="btn btn-logout" id="btnLogout">🚪 Đăng xuất</button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container-fluid main-content">
        <div class="row px-4">
            <!-- Products Section -->
            <div class="col-lg-8 col-xl-9">
                <!-- Food Section -->
                <div class="category-header food">
                    <span class="category-icon">🍕</span>
                    <h3>Đồ Ăn Ngon</h3>
                </div>
                <div class="row" id="foodList">
                    <div class="col-12 text-center loading">Đang tải sản phẩm...</div>
                </div>

                <!-- Drink Section -->
                <div class="category-header drink mt-5">
                    <span class="category-icon">🥤</span>
                    <h3>Đồ Uống Thơm Ngon</h3>
                </div>
                <div class="row" id="drinkList">
                    <div class="col-12 text-center loading">Đang tải sản phẩm...</div>
                </div>
            </div>

            <!-- Cart Sidebar -->
            <div class="col-lg-4 col-xl-3">
                <div class="cart-sidebar">
                    <div class="cart-header">
                        <h4>🛒 Giỏ Hàng</h4>
                    </div>
                    <div id="cartItems">
                        <div class="cart-empty">Giỏ hàng trống<br>😊</div>
                    </div>
                    <div class="cart-total">
                        <span class="cart-total-label">TỔNG CỘNG:</span>
                        <span class="cart-total-price" id="totalPrice">0đ</span>
                    </div>
                    <button class="btn-checkout" id="btnPlaceOrder"> ĐẶT HÀNG NGAY</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Thêm vào giỏ -->
    <div class="modal fade" id="quantityModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Thêm vào giỏ hàng</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="text-center mb-4">
                        <h4 id="modalProductName" class="modal-product-name">Sản phẩm</h4>
                        <p class="fs-3 fw-bold modal-product-price" id="modalProductPrice">0đ</p>
                    </div>
                    <div class="mb-3">
                        <label for="modalQuantityInput" class="form-label fw-bold">Số lượng:</label>
                        <div class="input-group input-group-lg">
                            <button class="btn btn-outline-secondary" type="button" id="btnDecrementQty">
                                <strong>−</strong>
                            </button>
                            <input 
                                type="number" 
                                class="form-control text-center fw-bold fs-4 modal-quantity-input" 
                                id="modalQuantityInput" 
                                value="1" 
                                min="1" 
                                max="999">
                            <button class="btn btn-outline-secondary" type="button" id="btnIncrementQty">
                                <strong>+</strong>
                            </button>
                        </div>
                        <small class="text-muted">Số lượng từ 1-999</small>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                    <button type="button" class="btn btn-checkout modal-btn-add" id="btnConfirmAddToCart">Thêm vào giỏ</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Lịch Sử -->
    <div class="modal fade" id="historyModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Lịch sử đặt hàng</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="historyContent">
                    <div class="text-center loading">Đang tải lịch sử...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="quantity-helper.js"></script>
    <script src="script.js"></script>
    <script src="event-handlers.js"></script>
    <script src="auth-guard.js"></script>
</body>
</html>
